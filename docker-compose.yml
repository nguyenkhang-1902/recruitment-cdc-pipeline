version: '3.8'

services:
  # --- DATA PERSISTENCE LAYER ---
  cassandra:
    image: cassandra:3.11
    container_name: cassandra
    volumes:
      - cassandra_data:/var/lib/cassandra
    ports:
      - "9042:9042"
    environment:
      - MAX_HEAP_SIZE=1G # Memory constraints for stable runtime
      - HEAP_NEWSIZE=400M
    networks:
      - etl-net

  mysql:
    image: mysql:8.0
    container_name: mysql
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: recruitment_dw
      MYSQL_TIME_ZONE: Asia/Ho_Chi_Minh
    networks:
      - etl-net

  # --- STREAMING & MESSAGING INFRASTRUCTURE ---
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - etl-net

  broker:
    image: confluentinc/cp-kafka:7.4.0
    container_name: broker
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      # Multi-listener configuration for internal (Docker) and external (Host) access
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - etl-net

  # --- COMPUTE LAYER (SPARK) ---
  spark:
    image: apache/spark:3.5.1
    container_name: spark
    user: root
    command: [ "bash", "-c", "sleep infinity" ]
    volumes:
      - ./data-pipeline:/opt/spark/data-pipeline
    networks:
      - etl-net

  # --- ORCHESTRATION LAYER (AIRFLOW) ---
  postgres-airflow:
    image: postgres:13
    container_name: postgres-airflow
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    networks:
      - etl-net

  airflow-webserver:
    build: .
    container_name: airflow-webserver
    depends_on:
      - postgres-airflow
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres-airflow/airflow
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - PYTHONPATH=/opt/airflow/scripts
      # Worker performance tuning
      - AIRFLOW__CORE__PARALLELISM=10
      - AIRFLOW__CORE__WORKER_CONCURRENCY=10
    volumes:
      - ./data-pipeline/airflow/dags:/opt/airflow/dags
      - ./data-pipeline/scripts:/opt/airflow/scripts
      - ./data-pipeline/airflow/logs:/opt/airflow/logs
      - ./data-pipeline/airflow/plugins:/opt/airflow/plugins
    ports:
      - "8080:8080"
    command: bash -c "airflow db init && (airflow users create --username admin --firstname shibe --lastname dev --role Admin --email admin@example.com --password admin || true) && airflow webserver"
    networks:
      - etl-net

  airflow-scheduler:
    build: .
    container_name: airflow-scheduler
    depends_on:
      - postgres-airflow
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres-airflow/airflow
      - PYTHONPATH=/opt/airflow/scripts
    volumes:
      - ./data-pipeline/airflow/dags:/opt/airflow/dags
      - ./data-pipeline/scripts:/opt/airflow/scripts
      - ./data-pipeline/airflow/logs:/opt/airflow/logs
      - ./data-pipeline/airflow/plugins:/opt/airflow/plugins
    command: scheduler
    networks:
      - etl-net

  backend:
    build:
      context: ./data-pipeline/app
      dockerfile: backend/Dockerfile
    container_name: recruitment-api
    environment:
      - DATABASE_URL=mysql+pymysql://root:root@mysql:3306/recruitment_dw
      - TZ=Asia/Ho_Chi_Minh
    ports:
      - "8000:8000"
    depends_on:
      - mysql
    networks:
      - etl-net

  frontend:
    build:
      context: ./data-pipeline/app
      dockerfile: frontend/Dockerfile
    container_name: recruitment-dashboard
    ports:
      - "8501:8501"
    depends_on:
      - backend
    networks:
      - etl-net
# --- NETWORK & STORAGE DEFINITIONS ---
networks:
  etl-net:
    driver: bridge

volumes:
  cassandra_data:
  mysql_data:
